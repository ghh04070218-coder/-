name: Package release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package
        run: bash scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: risklens-cn-free
          path: dist/risklens-cn-free.zip
